document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mptables</b></span>\n  <span class=\"ek-badge\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6\" stroke=\"#002856\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/></svg> <b>Commissariat aux comptes</b></span>\n  <span class=\"ek-badge\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"10\" rx=\"2\" stroke=\"#002856\" stroke-width=\"1.8\"/><path d=\"M8 10V7a4 4 0 018 0v3\" stroke=\"#002856\" stroke-width=\"1.8\"/></svg> Données <b>hébergées en France</b></span>\n  <span class=\"ek-badge\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"#002856\" stroke-width=\"1.8\"/><path d=\"M12 8v4l3 2\" stroke=\"#002856\" stroke-width=\"1.8\" stroke-linecap=\"round\"/></svg> Conforme <b>RGPD</b></span>\n</div></div>\n\n\n<main id=\"top\" style=\"padding-top:74px;\">\n\n<!-- ============ HERO ============ -->\n<section aria-labelledby=\"hero-title\" style=\"background:var(--lime);position:relative;overflow:hidden;\">\n  <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background-image:linear-gradient(var(--ink-12) 1px,transparent 1px),linear-gradient(90deg,var(--ink-12) 1px,transparent 1px);background-size:64px 64px;opacity:.3;mask-image:radial-gradient(120% 90% at 82% 8%,#000 22%,transparent 72%);\"></div>\n  <div style=\"max-width:1280px;margin:0 auto;padding:74px 24px 90px;display:grid;grid-template-columns:1.12fr 0.88fr;gap:48px;align-items:center;position:relative;\" data-hero-grid=\"1\">\n\n    <div>\n      <p style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;color:var(--ink);margin:0 0 26px;display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.55);padding:8px 14px;border-radius:999px;\">\n        <span aria-hidden=\"true\" style=\"width:8px;height:8px;background:var(--ink);border-radius:2px;\"></span>\n        EXPERTISE COMPTABLE &amp; CONSEIL · CÔTE D'OPALE &amp; AU-DELÀ\n      </p>\n      <h1 id=\"hero-title\" style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(44px,6.4vw,92px);line-height:0.94;letter-spacing:-2.5px;margin:0 0 26px;color:var(--ink);text-wrap:balance;\">\n        On fait grandir<br><span id=\"hero-line2\">votre entreprise.</span><br>\n        <span id=\"hero-ekz\" style=\"background:var(--ink);color:var(--lime);padding:0 .12em;display:inline-block;border-radius:4px;animation:pop .7s .45s both;\">EKZACTEMENT.</span>\n      </h1>\n      <p id=\"hero-sub\" style=\"font-size:clamp(15px,1.6vw,17.5px);line-height:1.38;margin:0 0 34px;color:var(--ink);font-weight:500;text-align:justify;letter-spacing:-.1px;\">\n        Le cabinet qui sort du cadre pour faire avancer les dirigeants : comptabilité, social, juridique &amp; conseil, pilotés par quatre associés experts-comptables &amp; commissaires aux comptes.\n      </p>\n      <div data-hero-cta=\"\" style=\"display:flex;flex-wrap:wrap;gap:14px;margin-bottom:40px;\">\n        <a href=\"#rdv\" style=\"white-space:nowrap;box-sizing:border-box;border:2px solid var(--ink);text-decoration:none;background:var(--ink);color:var(--paper);font-weight:700;font-size:16px;padding:13px 24px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,40,86,.32)\">\n          Prendre rendez-vous <span aria-hidden=\"true\">↗</span>\n        </a>\n        <a href=\"#espace-client\" style=\"white-space:nowrap;box-sizing:border-box;text-decoration:none;background:transparent;color:var(--ink);font-weight:700;font-size:16px;padding:13px 24px;border-radius:12px;border:2px solid var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:background .18s,color .18s;\" style-hover=\"background:var(--ink);color:var(--paper)\">\n          Espace client\n        </a>\n      </div>\n\n      <div aria-hidden=\"true\" style=\"display:flex;align-items:center;margin-bottom:22px;\">\n        <div style=\"flex:1;height:2.5px;background:var(--ink);border-radius:2px;\"></div>\n        <svg width=\"13\" height=\"16\" viewBox=\"0 0 13 16\" fill=\"none\" style=\"flex:0 0 auto;overflow:visible;\">\n          <path d=\"M0 8 H8\" stroke=\"var(--ink)\" stroke-width=\"2.5\"></path>\n          <path d=\"M3 2.5 L9 8 L3 13.5\" stroke=\"var(--ink)\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n        </svg>\n        <span style=\"margin-left:10px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--ink);background:var(--white);padding:5px 10px;border-radius:7px;box-shadow:0 6px 16px rgba(0,40,86,.12);\">// sortir_du_cadre</span>\n      </div>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px 22px;\">\n        <sc-for list=\"{{ proofs }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <li style=\"display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;\">\n            <span aria-hidden=\"true\" style=\"width:9px;height:9px;flex:0 0 auto;border:2px solid var(--ink);border-right:none;border-top:none;transform:rotate(-45deg);\"></span>\n            {{ p }}\n          </li>\n        </sc-for>\n      </ul>\n    </div>\n\n    <!-- SIGNATURE -->\n    <div style=\"display:flex;justify-content:center;align-items:center;\" data-hero-sig=\"1\">\n      <div style=\"--sig:0;position:relative;width:min(470px,86vw);aspect-ratio:1;filter:drop-shadow(0 26px 52px rgba(0,40,86,.20));\" style-hover=\"--sig:1\">\n        <svg viewBox=\"51.5 12.3 54 54\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;animation:sigIntro .7s ease-out both;\" aria-hidden=\"true\">\n          <polygon points=\"58.96 15.2 72.92 15.2 72.92 21.75 62.26 21.75 62.26 56.88 94.82 56.88 94.82 41.82 101.42 41.82 101.42 60.15 101.42 63.42 98.12 63.42 58.96 63.42 55.66 63.42 55.66 60.15 55.66 18.48 55.66 15.2 58.96 15.2\" fill=\"var(--ink)\"></polygon>\n          <g style=\"transform:translate(calc(var(--sig,0)*4px),calc(var(--sig,0)*-4px));transition:transform .5s cubic-bezier(.2,.9,.2,1);\">\n            <g style=\"animation:sigBurst 4.6s ease-in-out infinite;\">\n              <polygon points=\"79.52 15.2 98.12 15.2 101.42 15.2 101.42 18.48 101.42 35.27 94.82 35.27 94.82 26.04 78.13 42.6 78.16 33.32 89.81 21.75 79.52 21.75 79.52 15.2\" fill=\"var(--white)\"></polygon>\n            </g>\n          </g>\n        </svg>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ============ TICKER ============ -->\n<div aria-hidden=\"true\" style=\"background:var(--ink);overflow:hidden;border-top:3px solid var(--lime);border-bottom:3px solid var(--lime);\">\n  <div style=\"display:flex;width:max-content;animation:marquee 26s linear infinite;will-change:transform;\">\n    <div style=\"display:flex;flex:0 0 auto;\">\n      <sc-for list=\"{{ ticker }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <span style=\"display:inline-flex;align-items:center;gap:18px;padding:14px 30px;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.3px;color:var(--paper);white-space:nowrap;\">\n          {{ t }}<span style=\"color:var(--lime);font-size:20px;\">↗</span>\n        </span>\n      </sc-for>\n    </div>\n    <div style=\"display:flex;flex:0 0 auto;\">\n      <sc-for list=\"{{ ticker }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <span style=\"display:inline-flex;align-items:center;gap:18px;padding:14px 30px;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.3px;color:var(--paper);white-space:nowrap;\">\n          {{ t }}<span style=\"color:var(--lime);font-size:20px;\">↗</span>\n        </span>\n      </sc-for>\n    </div>\n  </div>\n</div>\n\n<!-- ============ APPROCHE ============ -->\n<section id=\"cabinet\" aria-labelledby=\"approche-title\" style=\"background:var(--paper);padding:96px 24px;\">\n  <div style=\"max-width:1280px;margin:0 auto;\">\n    <div data-reveal=\"1\" style=\"max-width:780px;margin-bottom:54px;\">\n      <p style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;color:var(--ink-60);margin:0 0 14px;\">01 / NOTRE APPROCHE</p>\n      <h2 id=\"approche-title\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(30px,4vw,52px);line-height:1.02;letter-spacing:-1.5px;margin:0;color:var(--ink);\">\n        Pas un prestataire de plus.<br>Un cabinet qui prend position.\n      </h2>\n    </div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\" data-cards-4=\"1\">\n      <sc-for list=\"{{ approach }}\" as=\"a\" hint-placeholder-count=\"4\">\n        <article data-reveal=\"1\" class=\"appr-card\" style=\"background:var(--white);border:1px solid var(--ink-12);border-radius:18px;padding:26px 24px 28px;position:relative;transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,40,86,.1)\">\n          <span aria-hidden=\"true\" class=\"appr-bracket\" style=\"position:absolute;top:18px;right:18px;width:26px;height:26px;border:3px solid var(--lime);border-right:none;border-top:none;\"></span>\n          <p class=\"appr-num\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:30px;color:var(--lime-2);margin:0 0 18px;\">{{ a.num }}</p>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;line-height:1.18;margin:0 0 10px;color:var(--ink);letter-spacing:-.3px;\">{{ a.title }}</h3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:var(--ink-60);margin:0;\">{{ a.body }}</p>\n        </article>\n      </sc-for>\n    </div>\n  </div>\n</section>\n\n<!-- ============ EXPERTISES ============ -->\n<section id=\"expertises\" aria-labelledby=\"exp-title\" style=\"background:var(--white);padding:96px 24px;border-top:1px solid var(--ink-12);\">\n  <div style=\"max-width:1280px;margin:0 auto;\">\n    <div data-reveal=\"1\" style=\"margin-bottom:48px;\">\n      <p style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;color:var(--ink-60);margin:0 0 14px;\">02 / EXPERTISES</p>\n      <h2 id=\"exp-title\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.6vw,48px);line-height:1.02;letter-spacing:-1.5px;margin:0;color:var(--ink);white-space:nowrap;\">Quatre métiers, un seul cap : le vôtre.</h2>\n      <p style=\"font-size:16px;line-height:1.5;color:var(--ink-60);margin:16px 0 0;white-space:nowrap;\">Des prestations pensées par bénéfice, coordonnées par votre associé référent.</p>\n    </div>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\" data-cards-4=\"1\">\n      <sc-for list=\"{{ expertises }}\" as=\"e\" hint-placeholder-count=\"4\">\n        <article data-reveal=\"1\" style=\"background:{{ e.bg }};color:{{ e.fg }};border:1px solid var(--ink-12);border-radius:20px;padding:26px 22px 28px;display:flex;flex-direction:column;min-height:340px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 46px rgba(0,40,86,.16)\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.2px;opacity:.7;\">{{ e.tag }}</span>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;line-height:1.1;letter-spacing:-.6px;margin:18px 0 10px;white-space:nowrap;\">{{ e.title }}</h3>\n          <p style=\"font-size:14px;line-height:1.5;margin:0;opacity:.82;text-align:justify;\">{{ e.body }}</p>\n          <ul style=\"list-style:none;margin:auto 0 0;padding:14px 0 0;border-top:1px solid {{ e.line }};display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ e.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n              <li style=\"font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;\">\n                <span aria-hidden=\"true\" style=\"font-family:'Archivo';\">↗</span>{{ pt }}\n              </li>\n            </sc-for>\n          </ul>\n        </article>\n      </sc-for>\n    </div>\n  </div>\n</section>\n\n<!-- ============ FACTURE 2026 ============ -->\n<section id=\"actualites\" aria-labelledby=\"fac-title\" style=\"background:var(--ink);color:var(--paper);padding:88px 24px;position:relative;overflow:hidden;\">\n  <div aria-hidden=\"true\" style=\"position:absolute;top:-60px;right:-40px;width:340px;height:340px;border:18px solid rgba(210,215,0,.16);\"></div>\n  <div style=\"max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1.1fr 0.9fr;gap:48px;align-items:stretch;position:relative;\" data-split=\"1\">\n    <div data-reveal=\"1\" style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;color:var(--lime);margin:0 0 16px;display:inline-flex;align-items:center;gap:10px;\">\n        <span aria-hidden=\"true\" style=\"width:8px;height:8px;background:var(--lime);border-radius:50%;\"></span>ON ANTICIPE POUR VOUS\n      </p>\n      <h2 id=\"fac-title\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.1vw,38px);line-height:1.04;letter-spacing:-1px;margin:0 0 20px;\">\n        <span style=\"white-space:nowrap;\">Facture électronique 2026 :</span><br><span style=\"color:var(--lime);\">prêts avant l'heure.</span>\n      </h2>\n      <p style=\"font-size:16.5px;line-height:1.6;max-width:34em;margin:0 0 28px;color:rgba(247,248,242,.82);\">\n        La réforme arrive — on ne la subit pas, on l'organise. À partir de 2026, la facturation électronique devient progressivement obligatoire pour toutes les entreprises : émission, réception et transmission des données via une plateforme agréée. Choix de la plateforme, paramétrage de vos outils, formation de vos équipes : on cartographie vos flux et on prépare chaque étape en amont, pour que votre passage à la facture électronique se fasse maintenant, sereinement, sans rien changer à votre quotidien.\n      </p>\n      <a href=\"#rdv\" style=\"text-decoration:none;background:var(--lime);color:var(--ink);font-weight:700;font-size:16px;padding:15px 26px;border-radius:12px;display:inline-flex;align-items:center;gap:10px;align-self:flex-start;margin-top:auto;transition:transform .15s,box-shadow .15s,background .18s,color .18s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,40,86,.32);background:var(--ink);color:var(--paper)\">Préparer ma mise en conformité <span aria-hidden=\"true\">↗</span></a>\n    </div>\n    <div data-reveal=\"1\" style=\"display:flex;flex-direction:column;gap:14px;\">\n      <sc-for list=\"{{ steps2026 }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(247,248,242,.16);border-radius:14px;padding:18px 22px;display:flex;gap:16px;align-items:flex-start;flex:1;\">\n          <span style=\"font-family:'Archivo';font-weight:800;font-size:18px;color:var(--lime);flex:0 0 auto;line-height:1.3;\">{{ s.k }}</span>\n          <div style=\"display:flex;flex-direction:column;justify-content:center;height:100%;\">\n            <p style=\"font-weight:700;font-size:15.5px;margin:0 0 4px;\">{{ s.t }}</p>\n            <p style=\"font-size:13.5px;line-height:1.45;margin:0;color:rgba(247,248,242,.7);text-align:justify;\">{{ s.d }}</p>\n          </div>\n        </div>\n      </sc-for>\n    </div>\n  </div>\n</section>\n\n<!-- ============ EQUIPE ============ -->\n<section id=\"equipe\" aria-labelledby=\"team-title\" style=\"background:var(--paper);padding:96px 24px;\">\n  <div style=\"max-width:1280px;margin:0 auto;\">\n    <div data-reveal=\"1\" style=\"max-width:760px;margin-bottom:50px;\">\n      <p style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;color:var(--ink-60);margin:0 0 14px;\">03 / L'ÉQUIPE</p>\n      <h2 id=\"team-title\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(30px,4vw,52px);line-height:1.02;letter-spacing:-1.5px;margin:0 0 14px;color:var(--ink);\">Quatre associés, un engagement.</h2>\n      <p style=\"font-size:17px;line-height:1.5;color:var(--ink-60);margin:0;\">Une équipe jeune et investie, qui connaît votre dossier et votre territoire.</p>\n    </div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\" data-cards-4=\"1\">\n      <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <figure data-reveal=\"1\" style=\"margin:0;background:var(--white);border:1px solid var(--ink-12);border-radius:18px;overflow:hidden;transition:transform .2s,box-shadow .2s,background .2s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,40,86,.16);background:var(--lime)\">\n          <div style=\"aspect-ratio:1/1;background:var(--white);position:relative;overflow:hidden;\">\n            <img src=\"{{ m.photo }}\" alt=\"{{ m.name }}\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 30%;display:block;filter:grayscale(1) contrast(1.03);\">\n            <span aria-hidden=\"true\" style=\"position:absolute;top:14px;left:14px;width:24px;height:24px;border:3px solid var(--lime);border-right:none;border-bottom:none;\"></span>\n          </div>\n          <figcaption style=\"padding:18px 20px 22px;\">\n            <p style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;margin:0 0 4px;color:var(--ink);letter-spacing:-.3px;\">{{ m.name }}</p>\n            <p style=\"font-size:13px;line-height:1.4;color:var(--ink-60);margin:0;\">{{ m.role }}</p>\n          </figcaption>\n        </figure>\n      </sc-for>\n    </div>\n  </div>\n</section>\n\n<!-- ============ ESPACE CLIENT ============ -->\n<section id=\"espace-client\" aria-labe style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting){\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => io.observe(el));\n  }\n\n  renderVals(){\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      nav: [\n        { label: 'Accueil', href: '#top' },\n        { label: 'Le cabinet', href: '#cabinet' },\n        { label: 'Expertises', href: '#expertises' },\n        { label: 'Actualités', href: '#actualites' },\n        { label: \"L'équipe\", href: '#equipe' },\n        { label: 'Nous rejoindre', href: '#rejoindre' },\n        { label: 'Contact', href: '#contact' }\n      ],\n      footerNav: [\n        { label: 'Accueil', href: '#top' },\n        { label: 'Le cabinet', href: '#cabinet' },\n        { label: 'Expertises', href: '#expertises' },\n        { label: 'Actualités', href: '#actualites' },\n        { label: \"L'équipe\", href: '#equipe' },\n        { label: 'Nous rejoindre', href: '#rejoindre' },\n        { label: 'Espace client', href: '#espace-client' },\n        { label: 'Contact', href: '#contact' }\n      ],\n      ticker: [\n        'COMPTABILITÉ & PILOTAGE', 'SOCIAL & PAIE', 'JURIDIQUE & FISCAL',\n        'CRÉATION & CONSEIL', 'FACTURE ÉLECTRONIQUE 2026', 'CÔTE D\\u2019OPALE'\n      ],\n      proofs: [\n        '4 associés experts-comptables',\n        \"Ancrés sur la Côte d'Opale\",\n        'Espace client en ligne'\n      ],\n      approach: [\n        { num: '01', title: 'On parle votre langue, pas celle du fisc', body: 'Vos comptes traduits en décisions concrètes : marges, trésorerie, cap à tenir. Vous pilotez, on éclaire.' },\n
